<!DOCTYPE html>
<html lang="pt-BR">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#111;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;position:fixed;top:0;left:0;overscroll-behavior:none}
body{display:flex;flex-direction:column}
#gbc{width:100%;height:100%;background:linear-gradient(160deg,#6ec6a8 0%,#5bbd98 40%,#4cb288 100%);display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
#gbc::before{content:'';position:absolute;top:0;left:0;right:0;height:30%;background:linear-gradient(to bottom,rgba(255,255,255,.12),transparent);pointer-events:none;border-radius:0 0 40% 40%}
#ir{position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:7px;background:#1a1a2e;border-radius:0 0 4px 4px;z-index:5}
#pwr{position:absolute;top:0;right:14%;width:22px;height:5px;background:#3a9a82;border-radius:0 0 3px 3px}
#pwr::after{content:'';position:absolute;right:2px;top:0;width:10px;height:5px;background:#2a8a70;border-radius:0 0 3px 0}
#top-t{padding-top:max(2%,17px);display:flex;justify-content:center}
#top-t span{font-family:Arial,Helvetica,sans-serif;font-weight:900;font-size:clamp(12px,3.5vw,18px);color:#3a8a6e;letter-spacing:clamp(2px,.8vw,4px);text-transform:uppercase}
#bz{width:calc(88vw + 4mm);height:calc(88vw * 0.93);aspect-ratio:auto;background:linear-gradient(145deg,#322e50,#28243e);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 2px 6px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.12);position:relative;margin-top:1%}
#led{position:absolute;top:-1px;left:10px;width:6px;height:6px;border-radius:50%;background:#ff2222;box-shadow:0 0 6px #ff2222;transition:opacity .3s}
#led.off{background:#441111;box-shadow:none}
#dot{position:absolute;top:-1px;right:10px;width:4px;height:4px;border-radius:50%;background:#444}
#scr{width:calc(86vw + 4mm);height:calc(88vw * 0.93 * 0.9);background:#080810;border-radius:4px;position:relative;overflow:hidden;box-shadow:inset 0 0 12px rgba(0,0,0,.9),inset 0 0 3px #000;display:flex;justify-content:center;align-items:center}
#scr::before{content:'';position:absolute;top:-40%;left:-40%;width:180%;height:180%;background:radial-gradient(ellipse at 30% 25%,rgba(255,255,255,.05),transparent 45%);pointer-events:none;z-index:20}
#scr::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:20}
#tint{position:absolute;inset:0;background:rgba(50,0,70,.03);pointer-events:none;z-index:19}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;position:relative;z-index:10}
#br{padding:max(.5%,3px) 0;display:flex;justify-content:center;gap:4px}
#br span{font-family:Arial,Helvetica,sans-serif;font-weight:900;font-size:clamp(7px,2.2vw,12px);color:#3a8a6e;letter-spacing:clamp(1px,.4vw,3px)}
#br .tm{font-size:clamp(4px,1.2vw,7px);vertical-align:super}
#ss{display:flex;gap:clamp(12px,4vw,20px);justify-content:center;padding:max(.5%,2px) 0;min-height:22px;align-items:center}
.sb{width:clamp(32px,8.5vw,44px);height:clamp(9px,2.6vw,12px);background:linear-gradient(to bottom,#555,#3a3a3a);border-radius:7px;transform:rotate(-25deg);display:flex;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:clamp(3px,1.1vw,5px);color:rgba(255,255,255,.25);letter-spacing:.5px;transition:background .04s}
.sb.on{background:linear-gradient(to bottom,#666,#4a4a4a)}
#ct{width:90%;display:flex;justify-content:space-between;align-items:center;min-height:150px;padding:0 1%}
#dp{position:relative;width:clamp(120px,33vw,155px);height:clamp(120px,33vw,155px);flex-shrink:0;margin-top:10mm}
.dp{position:absolute;background:#2a2a2a;transition:background .04s;z-index:2}
.dp.on{background:#444}
.du{width:36%;height:30%;top:0;left:32%;border-radius:6px 6px 0 0}
.dd{width:36%;height:30%;bottom:0;left:32%;border-radius:0 0 6px 6px}
.dl{width:30%;height:36%;top:32%;left:0;border-radius:6px 0 0 6px}
.dr{width:30%;height:36%;top:32%;right:0;border-radius:0 6px 6px 6px}
#dc{position:absolute;width:36%;height:36%;top:32%;left:32%;background:#2a2a2a;border-radius:3px;pointer-events:none;z-index:1}
#abw{display:flex;gap:clamp(18px,5vw,25px);transform:rotate(-25deg);flex-shrink:0;align-items:center;margin-top:10mm}
.ab{width:clamp(54px,14.5vw,68px);height:clamp(54px,14.5vw,68px);border-radius:50%;background:linear-gradient(145deg,#9b2255,#7a1a44);display:flex;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:clamp(11px,3.5vw,16px);color:rgba(255,255,255,.22);box-shadow:0 4px 0 #5a1030,0 5px 10px rgba(0,0,0,.3);transition:transform .04s,box-shadow .04s;z-index:2}
.ab:active,.ab.on{transform:translateY(3px);box-shadow:0 1px 0 #5a1030,0 2px 4px rgba(0,0,0,.3)}
#spk{position:absolute;bottom:max(1.5%,6px);right:11%;display:flex;flex-direction:column;gap:clamp(1px,.4vw,2px);transform:rotate(-30deg)}
.sl{width:clamp(16px,5vw,26px);height:clamp(1px,.4vw,2px);background:rgba(0,0,0,.18);border-radius:1px}
#cred{position:absolute;bottom:53px;left:50%;transform:translateX(-50%);font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:clamp(5px,1.4vw,7px);color:rgba(0,0,0,.16);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
#nin{position:absolute;bottom:max(1%,4px);left:50%;transform:translateX(-50%);font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:clamp(5px,1.4vw,7px);color:rgba(0,0,0,.16);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
#lw{position:fixed;inset:0;background:#0a0a0a;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:'Press Start 2P',monospace;text-align:center;padding:24px;gap:22px}
#lw .ic{font-size:36px;animation:rb 2s ease-in-out infinite}
@keyframes rb{0%,100%{transform:rotate(90deg)}50%{transform:rotate(0)}}
@media(pointer:coarse) and (orientation:landscape){#lw{display:flex!important}}
</style>
</head>

<script>
var C=document.getElementById('g'),X=C.getContext('2d');
var VW=160,VH=144,T=16,GY=120,GH=24;
var GR=0.32,MF=8,PS=1.8,PJ=-7.2,PH=14,PW=10;
var COY=9,JBF=9;
var ac=null;
function ia(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function sn(t){if(!ac)return;try{var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);var n=ac.currentTime;if(t==='j'){o.type='square';o.frequency.setValueAtTime(440,n);o.frequency.linearRampToValueAtTime(660,n+.08);g.gain.setValueAtTime(.06,n);g.gain.linearRampToValueAtTime(0,n+.1);o.start(n);o.stop(n+.1)}else if(t==='c'){o.type='square';o.frequency.setValueAtTime(988,n);o.frequency.setValueAtTime(1319,n+.05);g.gain.setValueAtTime(.04,n);g.gain.linearRampToValueAtTime(0,n+.14);o.start(n);o.stop(n+.14)}else if(t==='s'){o.type='triangle';o.frequency.setValueAtTime(200,n);o.frequency.linearRampToValueAtTime(80,n+.07);g.gain.setValueAtTime(.08,n);g.gain.linearRampToValueAtTime(0,n+.09);o.start(n);o.stop(n+.09)}else if(t==='d'){o.type='square';o.frequency.setValueAtTime(400,n);o.frequency.linearRampToValueAtTime(80,n+.45);g.gain.setValueAtTime(.06,n);g.gain.linearRampToValueAtTime(0,n+.5);o.start(n);o.stop(n+.5)}else if(t==='b'){o.type='triangle';o.frequency.setValueAtTime(160,n);g.gain.setValueAtTime(.04,n);g.gain.linearRampToValueAtTime(0,n+.05);o.start(n);o.stop(n+.05)}else if(t==='w'){o.type='square';[523,659,784,1047].forEach(function(f,i){o.frequency.setValueAtTime(f,n+i*.08)});g.gain.setValueAtTime(.04,n);g.gain.linearRampToValueAtTime(0,n+.4);o.start(n);o.stop(n+.4)}else if(t==='ok'){o.type='square';o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.06);o.frequency.setValueAtTime(784,n+.12);g.gain.setValueAtTime(.05,n);g.gain.linearRampToValueAtTime(0,n+.2);o.start(n);o.stop(n+.2)}}catch(e){}}

/* === Sistema de Salvamento === */
var SAVE_KEY = 'aventura_heroi_save';
function saveProgress(){
    try{
        var data=[];
        for(var i=0;i<50;i++) data.push(MN[i].u?1:0, MN[i].c?1:0);
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }catch(e){}
}
function loadProgress(){
    try{
        var raw=localStorage.getItem(SAVE_KEY);
        if(!raw) return;
        var data=JSON.parse(raw);
        if(!data||data.length<100) return;
        for(var i=0;i<50;i++){
            MN[i].u = data[i*2]===1;
            MN[i].c = data[i*2+1]===1;
        }
    }catch(e){}
}
function resetSave(){
    try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
}

var K={},T_={l:false,r:false,j:false,jp:false,s:false,sp:false,u:false,d:false};
window.addEventListener('keydown',function(e){K[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)!==-1)e.preventDefault()});
window.addEventListener('keyup',function(e){K[e.code]=false;K._sp=false});
function bindBtn(id,p,j){var el=document.getElementById(id);el.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ia();T_[p]=true;if(j)T_[p+'p']=true;el.classList.add('on')},{passive:false});el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();T_[p]=false;el.classList.remove('on')},{passive:false});el.addEventListener('touchcancel',function(){T_[p]=false;el.classList.remove('on')})}
bindBtn('dl','l',0);bindBtn('dr','r',0);
(function(){
    var el=document.getElementById('du');
    el.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ia();T_.j=true;T_.jp=true;T_.u=true;el.classList.add('on')},{passive:false});
    el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();T_.j=false;T_.u=false;el.classList.remove('on')},{passive:false});
    el.addEventListener('touchcancel',function(){T_.j=false;T_.u=false;el.classList.remove('on')});
})();
(function(){
    var el=document.getElementById('dd');
    el.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ia();T_.d=true;el.classList.add('on')},{passive:false});
    el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();T_.d=false;el.classList.remove('on')},{passive:false});
    el.addEventListener('touchcancel',function(){T_.d=false;el.classList.remove('on')});
})();
bindBtn('ba','j',1);
bindBtn('bb','s',1);

function bindSys(id,fn){var el=document.getElementById(id);el.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();ia();el.classList.add('on');fn()},{passive:false});el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();el.classList.remove('on')},{passive:false});el.addEventListener('touchcancel',function(){el.classList.remove('on')})}
bindSys('stab',function(){
    if(stt==='menu'){stt='map'}
    else if(stt==='map')selMap();
    else if(stt==='pause')stt='play';
    else if(stt==='victory')stt='map';
});
bindSys('selb',function(){
    if(stt==='play')stt='pause';
    else if(stt==='pause')stt='play';
    else if(stt==='map')stt='menu';
    else if(stt==='victory')stt='map';
});

function iL(){return K.ArrowLeft||K.KeyA||T_.l}
function iR(){return K.ArrowRight||K.KeyD||T_.r}
function iJ(){return K.Space||K.ArrowUp||K.KeyW||T_.j}
function iJP(){if(T_.jp){T_.jp=false;return true}if(K._jp)return false;if(K.Space||K.ArrowUp||K.KeyW){K._jp=true;return true}return false}
function iSP(){if(T_.sp){T_.sp=false;return true}if(K._sp)return false;if(K.KeyX||K.ShiftLeft||K.KeyZ){K._sp=true;return true}return false}

function Rng(s){return function(){s=(s*16807)%2147483647;return(s-1)/2147483646}}
function genLvl(n){
var r=Rng(n*12345+6789);
var cycle_progress = ((n % 10) + 1) / 10; 
var cycle_base = Math.floor(n / 10) * 0.2;
var d = cycle_base + cycle_progress * 0.4;
if(d > 1.2) d = 1.2;

var lw=(4500+d*3500+r()*500)|0;
var G=[],B=[],E=[],Co=[],Pi=[],x=0;
while(x<lw-250){var sw=(80+r()*(120-d*40))|0;G.push({x:x,w:sw});x+=sw;
if(x<lw-500&&r()<.25+d*.35)x+=(36+r()*(20+d*20))|0}
G.push({x:x,w:Math.max(200,lw-x+40)});

function isOccupied(bx,by){for(var i=0;i<B.length;i++){if(B[i].x===bx&&B[i].y===by)return true}return false}

for(var i=0;i<G.length;i++){var g=G[i];if(g.w<64||r()>.55)continue;
var bx=g.x+16+(r()*(g.w-48))|0,by=GY-32-(r()*32)|0;
if(!isOccupied(bx,by))B.push({x:bx,y:by,t:r()<.35?'q':'b'});
if(r()<.25+d*.2){for(var j=1;j<=2+(r()*2|0);j++){var nbx=bx+j*16;if(!isOccupied(nbx,by))B.push({x:nbx,y:by,t:r()<.3?'q':'b'})}}
if(r()<.2+d*.15){if(!isOccupied(bx+16,by-16))B.push({x:bx+16,y:by-16,t:r()<.4?'q':'b'})}}
var np=2+(d*8)|0;
for(var i=0;i<np;i++){var px=150+(r()*(lw-400))|0,py=GY-48-(r()*16)|0,pw=32+(r()*48)|0;
for(var j=0;j<pw;j+=16){if(!isOccupied(px+j,py))B.push({x:px+j,y:py,t:'s'})}
Co.push({x:px+(pw/2-8)|0,y:py-16})}
if(d>.15&&r()<d*.8){var sx=(lw*.55+r()*lw*.25)|0,steps=3+(d*5)|0;
for(var s=0;s<steps;s++)for(var h=0;h<=s&&h<5;h++){if(!isOccupied(sx+s*16,GY-16-h*16))B.push({x:sx+s*16,y:GY-16-h*16,t:'s'})}}

var ne=4+(d*22)|0;
for(var i=0;i<ne;i++){var ex=250+(r()*(lw-420))|0;
var etype='walker';var rr=r();if(rr<d*0.65)etype='shooter';else if(rr<d*0.65+0.15)etype='frog';
for(var j=0;j<G.length;j++)if(ex>=G[j].x+10&&ex<=G[j].x+G[j].w-20){E.push({x:ex, type: etype});break}}

var nb=1+(d*5)|0;
for(var i=0;i<nb;i++){var bx=250+(r()*(lw-420))|0; var by=20+(r()*50)|0;
E.push({x:bx, y:by, type:'bird'})}

var nc=8+(r()*12+d*15)|0;
for(var i=0;i<nc;i++)Co.push({x:16+(r()*(lw-48))|0,y:GY-32-(r()*48)|0});
var np2=1+(d*3)|0;
for(var i=0;i<np2;i++){var px=80+(r()*(lw-250))|0;Pi.push({x:px,h:2+(r()<d?1:0)})}

for(var wy=0;wy<GY;wy+=T){if(!isOccupied(0,wy))B.push({x:0,y:wy,t:'s'})}

return{w:lw,g:G,b:B,e:E,c:Co,p:Pi,f:{x:lw-40}}}

var MN=[],MP=[],mapCur=0,mapCd=0,mapCam={x:0,y:0},mapPv={l:0,r:0,sel:0,u:0,d:0};
for(var i=0;i<50;i++){var row=(i/5)|0,col=i%5;MN.push({x:(row%2===0?col:4-col)*30+15,y:row*22+30,u:i===0,c:false})}
for(var i=0;i<49;i++)MP.push([i,i+1]);
loadProgress();
(function(){
    for(var i=0;i<50;i++){if(MN[i].u&&!MN[i].c){mapCur=i;return}mapCur=i;}
})();
function mapMv(dir){
    var r=(mapCur/5)|0,c=mapCur%5,vis_c=(r%2===0)?c:(4-c);
    var new_r=r,new_vis_c=vis_c;
    if(dir==='r')new_vis_c=vis_c+1;
    else if(dir==='l')new_vis_c=vis_c-1;
    else if(dir==='d')new_r=r+1;
    else if(dir==='u')new_r=r-1;
    if(new_r<0||new_r>=10||new_vis_c<0||new_vis_c>=5)return;
    var new_c=(new_r%2===0)?new_vis_c:(4-new_vis_c);
    var nb=new_r*5+new_c;
    if(nb>=0&&nb<50&&MN[nb].u)mapCur=nb
}
function selMap(){if(!MN[mapCur].u)return;sn('ok');startLvl(mapCur)}
function startLvl(idx){curLevel=idx;lv=genLvl(idx);LW=lv.w;initGame();stt='play'}

var stt='menu',score=0,cc=0,lv_cnt=3,tk=0,curLevel=0,LW=320;
var pl,cam,bks,ens,cns,pcs,pts,fts,shk,lv,prjs,camOffset=16;
var clds=[];for(var i=0;i<14;i++)clds.push({x:Math.random()*800,y:10+Math.random()*80,w:20+Math.random()*25,h:7+Math.random()*5});

var themes = [
    { skyTop:'#5C94FC', skyBot:'#88B8FF', cloud:'rgba(255,255,255,.6)', ground:'#C84C0C', groundLight:'#E09050', groundDark:'#D07838', grass:'#00A800', pipeMain:'#00A800', pipeLight:'#00D800', pipeDark:'#007800' },
    { skyTop:'#E8C56D', skyBot:'#FAD8B6', cloud:'rgba(255,255,255,.3)', ground:'#C8A060', groundLight:'#E0C080', groundDark:'#B89050', grass:'#9B7653', pipeMain:'#9B6B3A', pipeLight:'#B8884A', pipeDark:'#7A5228' },
    { skyTop:'#A0C4E8', skyBot:'#D8E8F8', cloud:'rgba(255,255,255,.8)', ground:'#8AA8C0', groundLight:'#A8C0D0', groundDark:'#7890A8', grass:'#E0F0FF', pipeMain:'#608098', pipeLight:'#7898A8', pipeDark:'#506878' },
    { skyTop:'#2F4F2F', skyBot:'#4E7A4E', cloud:'rgba(100,160,100,.4)', ground:'#4A3B2A', groundLight:'#5C4A38', groundDark:'#382A1E', grass:'#1E4D0C', pipeMain:'#2E5A1E', pipeLight:'#3E7A2E', pipeDark:'#1E4A0E' },
    { skyTop:'#4A0000', skyBot:'#8B0000', cloud:'rgba(200,50,0,.2)', ground:'#333333', groundLight:'#4A4A4A', groundDark:'#222222', grass:'#FF4500', pipeMain:'#555555', pipeLight:'#777777', pipeDark:'#333333' }
];
var curTheme = themes[0];

function pR(){return lv.p.map(function(p){return{x:p.x,y:GY-p.h*T,w:T*2,h:p.h*T,pipe:true}})}
function initGame(){score=0;cc=0;lv_cnt=3;tk=0;cam={x:0};shk={x:0,y:0,d:0};pts=[];fts=[];pcs=[];prjs=[];
curTheme = themes[Math.floor(curLevel / 10)];
var d_gen=(Math.floor(curLevel/10)*0.2+(((curLevel%10)+1)/10)*0.4); if(d_gen>1.2)d_gen=1.2;
bks=lv.b.map(function(b){return{x:b.x,y:b.y,t:b.t,u:b.t==='q'?false:undefined,bp:0,bv:0}});
ens=lv.e.map(function(e){
    var isS=e.type==='shooter', isB=e.type==='bird', isF=e.type==='frog';
